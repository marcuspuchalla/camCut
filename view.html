<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>camCut — viewer</title>
    <style>
      * { box-sizing: border-box; }
      html, body {
        margin: 0;
        height: 100%;
        background: #000;
        overflow: hidden;
        font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
      }
      #view {
        width: 100vw;
        height: 100vh;
        object-fit: contain;
        display: block;
        background: #000;
      }
      #overlay {
        position: fixed;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        text-align: center;
        color: #cfd6e2;
        padding: 24px;
        pointer-events: none;
      }
      #overlay .card {
        background: rgba(20, 24, 32, 0.85);
        border: 1px solid #2a2f3a;
        border-radius: 12px;
        padding: 18px 22px;
        max-width: 320px;
        line-height: 1.4;
      }
      #overlay.hidden { display: none; }
      .spinner {
        width: 22px;
        height: 22px;
        margin: 0 auto 12px;
        border: 3px solid #3a4150;
        border-top-color: #4f9dff;
        border-radius: 50%;
        animation: spin 0.9s linear infinite;
      }
      @keyframes spin { to { transform: rotate(360deg); } }
    </style>
  </head>
  <body>
    <video id="view" playsinline autoplay muted></video>
    <div id="overlay">
      <div class="card">
        <div class="spinner"></div>
        <div id="msg">Connecting…</div>
      </div>
    </div>
    <script type="module" src="/src/viewer.ts"></script>
  </body>
</html>
