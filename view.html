<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#0b0d1a" />
    <title>Baby Cam Cut — viewer</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@600;700&display=swap"
      rel="stylesheet"
    />
    <style>
      * { box-sizing: border-box; }
      html, body {
        margin: 0;
        height: 100%;
        background: #0b0d1a;
        overflow: hidden;
        font-family: "Baloo 2", "SF Pro Rounded", ui-rounded, system-ui, sans-serif;
      }
      #view {
        width: 100vw;
        height: 100vh;
        height: 100dvh;
        object-fit: contain;
        display: block;
        background: #0b0d1a;
      }
      #overlay {
        position: fixed;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        text-align: center;
        padding: 24px;
        color: #cdd5ff;
        pointer-events: none;
        background: radial-gradient(circle at 50% 40%, rgba(30, 34, 64, 0.35), rgba(11, 13, 26, 0.9));
      }
      #overlay.hidden { display: none; }
      .card {
        background: rgba(23, 26, 48, 0.82);
        border: 1px solid #2b2f52;
        border-radius: 18px;
        padding: 22px 26px;
        max-width: 320px;
        line-height: 1.45;
        box-shadow: 0 20px 50px -20px rgba(0, 0, 0, 0.7);
      }
      .moon {
        color: #ffd9a8;
        margin-bottom: 10px;
        filter: drop-shadow(0 0 12px rgba(255, 190, 130, 0.4));
      }
      #msg { font-size: 1.02rem; }
      .spinner {
        width: 24px;
        height: 24px;
        margin: 14px auto 0;
        border: 3px solid #3a4173;
        border-top-color: #ffb877;
        border-radius: 50%;
        animation: spin 0.9s linear infinite;
      }
      @keyframes spin { to { transform: rotate(360deg); } }
      @media (prefers-reduced-motion: reduce) { .spinner { animation: none; } }

      #popout {
        position: fixed;
        top: max(14px, env(safe-area-inset-top));
        right: max(14px, env(safe-area-inset-right));
        z-index: 10;
        display: inline-flex;
        align-items: center;
        gap: 7px;
        font: 600 0.95rem "Baloo 2", "SF Pro Rounded", ui-rounded, system-ui, sans-serif;
        color: #eaecf7;
        background: rgba(23, 26, 48, 0.72);
        border: 1px solid #2b2f52;
        border-radius: 999px;
        padding: 9px 15px;
        cursor: pointer;
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        -webkit-tap-highlight-color: transparent;
      }
      #popout:hover { background: rgba(35, 40, 72, 0.85); }
      #popout.hidden { display: none; }
    </style>
  </head>
  <body>
    <video id="view" playsinline autoplay muted></video>
    <button id="popout" class="hidden" aria-label="Pop out an always-on-top window">📌 Pop out</button>
    <div id="overlay">
      <div class="card">
        <svg class="moon" viewBox="0 0 32 32" width="30" height="30" aria-hidden="true">
          <path d="M22 21a9 9 0 1 1-6.6-15.2A7 7 0 1 0 22 21Z" fill="currentColor" />
        </svg>
        <div id="msg">Connecting…</div>
        <div class="spinner"></div>
      </div>
    </div>
    <script type="module" src="/src/viewer.ts"></script>
  </body>
</html>
